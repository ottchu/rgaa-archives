name: Mise à jour des archives RGAA

on:
  schedule:
    # Tous les lundis à 05h00 UTC (06h/07h heure de Paris)
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      full:
        description: "Récupération complète de l'historique (premier lancement)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r scraper/requirements.txt

      - name: Lancer le scraper
        run: |
          if [ "${{ github.event.inputs.full }}" = "true" ]; then
            python scraper/scrape.py --full
          else
            python scraper/scrape.py
          fi

      - name: Générer les résumés IA (si clé API configurée)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Pas de clé API Anthropic configurée : résumés ignorés."
          else
            python scraper/summarize.py
          fi

      - name: Committer les données mises à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "Aucun changement."
          else
            git commit -m "Mise à jour des archives ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main
            git push
          fi
